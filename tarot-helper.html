<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Карманный помощник Таро · Жанна Раевская</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Nunito:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:linear-gradient(160deg,#0e0e22 0%,#15152e 50%,#0e0e22 100%);min-height:100vh;color:#f8f2e8;font-family:'Nunito',sans-serif;font-size:17px}
@keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes shimmer{0%,100%{opacity:0.55}50%{opacity:1}}
@keyframes glow{0%,100%{box-shadow:0 0 18px rgba(240,184,60,0.25)}50%{box-shadow:0 0 32px rgba(240,184,60,0.5)}}
@keyframes cardIn{from{opacity:0;transform:translateY(18px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.fade-up{animation:fadeUp 0.75s ease both}
.d1{animation-delay:0.12s}.d2{animation-delay:0.24s}
.page{display:flex;flex-direction:column;align-items:center;padding:50px 20px 80px}
.header{text-align:center;margin-bottom:52px;max-width:700px;width:100%}
.stars-row{display:flex;justify-content:center;align-items:center;gap:20px;margin-bottom:16px}
.s{color:#f0c050;animation:shimmer 2s ease-in-out infinite}
.s1{font-size:13px;opacity:0.6;animation-delay:0s}
.s2{font-size:26px;opacity:1;animation-delay:0.4s}
.s3{font-size:13px;opacity:0.6;animation-delay:0.8s}
h1{font-family:'Cormorant Garamond',serif;font-size:clamp(32px,5.5vw,52px);font-weight:300;letter-spacing:0.06em;color:#ffffff;line-height:1.15;margin-bottom:10px}
.subtitle{font-family:'Cormorant Garamond',serif;font-size:clamp(17px,2.5vw,21px);color:#c8b89e;font-style:italic;font-weight:300;letter-spacing:0.08em;line-height:1.5}
.gold-line{height:1px;width:120px;background:linear-gradient(90deg,transparent,#f0c050,transparent);margin:20px auto 0}
.card{width:100%;max-width:680px;background:rgba(22,22,46,0.95);border:1px solid rgba(240,192,80,0.3);border-radius:20px;padding:clamp(24px,4vw,44px)}
.input-label{display:block;font-family:'Cormorant Garamond',serif;font-size:21px;font-weight:400;color:#f0c050;margin-bottom:14px;letter-spacing:0.05em}
textarea{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(240,192,80,0.25);border-radius:10px;padding:16px 18px;color:#f8f2e8;font-family:'Nunito',sans-serif;font-size:16px;line-height:1.8;resize:vertical;min-height:135px;transition:border-color 0.2s,background 0.2s}
textarea:focus{outline:none;border-color:rgba(240,192,80,0.6);background:rgba(255,255,255,0.07)}
textarea::placeholder{color:#6a5e54;font-style:italic}
.input-footer{display:flex;justify-content:space-between;align-items:center;margin-top:20px;flex-wrap:wrap;gap:12px}
.hint{font-size:13px;color:#5a5050}
.btn-primary{background:linear-gradient(135deg,#f0c050 0%,#d4900a 100%);border:none;border-radius:10px;color:#1a1200;font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:600;letter-spacing:0.12em;padding:14px 36px;cursor:pointer;transition:all 0.25s;display:flex;align-items:center;gap:10px;box-shadow:0 4px 20px rgba(240,184,60,0.4);animation:glow 3s ease-in-out infinite}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 28px rgba(240,184,60,0.6);background:linear-gradient(135deg,#ffd166 0%,#e8a012 100%)}
.btn-primary:active{transform:scale(0.97)}
.btn-primary:disabled{background:rgba(180,160,80,0.2);border:1px solid rgba(240,192,80,0.2);color:#9a8868;cursor:not-allowed;transform:none;box-shadow:none;animation:none}
.result-label{font-size:12px;letter-spacing:0.25em;color:#a89878;text-transform:uppercase;text-align:center;margin-bottom:18px}
.arcana-display{display:flex;justify-content:center;gap:24px;flex-wrap:wrap;margin-bottom:28px}
.arcana-card{background:rgba(240,192,80,0.07);border:1px solid rgba(240,192,80,0.3);border-radius:14px;padding:20px 24px 24px;min-width:160px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:10px}
.arcana-svg{width:80px;height:110px;opacity:0.92;animation:float 4s ease-in-out infinite}
.arcana-meta{font-family:'Cormorant Garamond',serif;font-size:13px;color:#a89878;letter-spacing:0.18em;text-transform:uppercase}
.arcana-name{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;color:#ffd166;letter-spacing:0.04em;line-height:1.1}
.divider-r{height:1px;background:linear-gradient(90deg,transparent,rgba(240,192,80,0.35),transparent);margin:22px 0}
.section-lbl{font-size:12px;letter-spacing:0.22em;color:#a89878;text-transform:uppercase;margin-bottom:10px}
.reason-text{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:300;color:#f8f2e8;line-height:1.8;font-style:italic;margin-bottom:22px}
.focus-box{background:rgba(240,192,80,0.07);border:1px solid rgba(240,192,80,0.2);border-radius:12px;padding:18px 22px;margin-bottom:24px}
.focus-lbl{font-size:12px;letter-spacing:0.22em;color:#f0c050;text-transform:uppercase;margin-bottom:9px}
.focus-text{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:300;color:#f8f2e8;line-height:1.8}
.aff-toggle{width:100%;background:transparent;border:1px solid rgba(240,192,80,0.22);border-radius:10px;color:#c8b89e;font-family:'Cormorant Garamond',serif;font-size:18px;padding:14px 22px;cursor:pointer;letter-spacing:0.05em;text-align:left;display:flex;justify-content:space-between;align-items:center;transition:all 0.2s}
.aff-toggle:hover{background:rgba(240,192,80,0.06);color:#f0c050}
.aff-toggle.open{border-radius:10px 10px 0 0}
.chevron{font-size:22px;transition:transform 0.25s;display:inline-block}
.chevron.open{transform:rotate(90deg)}.chevron.closed{transform:rotate(-90deg)}
.aff-body{background:rgba(255,255,255,0.02);border:1px solid rgba(240,192,80,0.18);border-top:none;border-radius:0 0 10px 10px;padding:24px 26px;animation:fadeUp 0.4s ease both}
.aff-para{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:300;color:#f0e8d8;line-height:1.9;margin-bottom:13px;font-style:italic}
.aff-para:first-child{font-style:normal;font-size:19px;color:#ffd166}
.aff-para:last-child{margin-bottom:0;font-style:normal;color:#f0c050}
.action-row{display:flex;gap:14px;margin-top:24px}
.btn-ghost{flex:1;background:transparent;border:1px solid rgba(240,192,80,0.22);border-radius:10px;color:#c8b89e;font-family:'Cormorant Garamond',serif;font-size:17px;padding:13px;cursor:pointer;letter-spacing:0.05em;transition:all 0.2s}
.btn-ghost:hover{background:rgba(255,255,255,0.05);color:#f0e8d8;border-color:rgba(240,192,80,0.4)}
.btn-new{flex:1;background:rgba(240,192,80,0.12);border:1px solid rgba(240,192,80,0.5);border-radius:10px;color:#f0c050;font-family:'Cormorant Garamond',serif;font-size:17px;padding:13px;cursor:pointer;letter-spacing:0.05em;transition:all 0.2s}
.btn-new:hover{background:rgba(240,192,80,0.2)}
.error-msg{margin-top:15px;color:#e08878;font-size:15px;text-align:center}
.footer{margin-top:44px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:16px}
.tg-btn{display:inline-flex;align-items:center;gap:10px;background:rgba(41,182,246,0.12);border:1px solid rgba(41,182,246,0.35);border-radius:10px;color:#82d4f7;font-family:'Nunito',sans-serif;font-size:15px;font-weight:500;padding:11px 24px;text-decoration:none;transition:all 0.2s;letter-spacing:0.03em}
.tg-btn:hover{background:rgba(41,182,246,0.2);color:#b8e8fa;transform:translateY(-1px)}
.tg-icon{width:20px;height:20px;fill:#82d4f7}
.footer-text{font-size:13px;color:#4a4060}
.footer-text a{color:#7a6878;text-decoration:none}
.footer-text a:hover{color:#f0c050}
@media(max-width:480px){.input-footer{justify-content:flex-end}.hint{display:none}.action-row{flex-direction:column}}
</style>
</head>
<body>
<div class="page">
<header class="header fade-up">
  <div class="stars-row">
    <span class="s s1">✦</span><span class="s s2">✦</span><span class="s s1">✦</span>
  </div>
  <h1>Карманный помощник Таро</h1>
  <p class="subtitle">Опишите свою ситуацию — и карты подскажут путь</p>
  <div class="gold-line"></div>
</header>

<div class="card fade-up d1" id="mainCard">
  <div id="inputScreen">
    <label class="input-label" for="sit">Расскажите о своей ситуации</label>
    <textarea id="sit" placeholder="Например: «Хочу открыть своё дело, но не знаю с чего начать» или «Чувствую тупик в отношениях, не понимаю как поступить»"></textarea>
    <div class="input-footer">
      <span class="hint">Ctrl + Enter для отправки</span>
      <button class="btn-primary" id="submitBtn" onclick="runQuery()" disabled>✦&nbsp; Узнать аркан</button>
    </div>
    <p class="error-msg" id="errorMsg" style="display:none"></p>
  </div>
  <div id="resultScreen" style="display:none"></div>
</div>

<footer class="footer fade-up d2">
  <a class="tg-btn" href="https://t.me/zhanna_raevskaya" target="_blank">
    <svg class="tg-icon" viewBox="0 0 24 24"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.894 8.221-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.447 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.12L7.43 13.267l-2.96-.924c-.643-.204-.657-.643.136-.953l11.57-4.461c.537-.194 1.006.131.718.292z"/></svg>
    Написать в Telegram
  </a>
  <p class="footer-text"><a href="https://zhannaraevskaya-art.github.io/zhanna.Claude-/" target="_blank">Жанна Раевская · Таро. Жить собой</a></p>
</footer>
</div>

function getAffirmation(name){
  return[
    `Я призываю силы Земли, силы Вселенной, силы аркана ${name}!`,
    `Я призываю аркан ${name} помочь мне в моём деле.`,
    `Прямо сейчас я чувствую и ощущаю помощь аркана ${name} в моей жизни.`,
    `Я знаю, и знаю, как это чувствуется — иметь расширение возможностей энергией аркана ${name}.`,
    `Я ощущаю, как возможности Вселенной текут ко мне, как силы просыпаются во мне.`,
    `Я получаю желаемое.`,
    `Благодарю тебя, Вселенная! Благодарю тебя, ${name}.`,
    `Я получаю помощь и твою мудрость прямо сейчас.`
  ];
}

function analyze(text){
  const t=text.toLowerCase();
  const scores=ARCANA.map(a=>{
    let s=0;
    a.kw.forEach(k=>{if(t.includes(k)) s+=k.length>6?3:k.includes(" ")?4:1;});
    return{num:a.num,score:s};
  });
  const sorted=scores.filter(x=>x.score>0).sort((a,b)=>b.score-a.score);
  if(sorted.length===0) return{arcana:10,arcana2:null}; // fallback: Колесо Фортуны
  const a1=sorted[0].num;
  const a2=(sorted.length>1&&sorted[1].score>=sorted[0].score*0.55)?sorted[1].num:null;
  return{arcana:a1,arcana2:a2};
}

const textarea=document.getElementById('sit');
const submitBtn=document.getElementById('submitBtn');
textarea.addEventListener('input',()=>{submitBtn.disabled=!textarea.value.trim();});
textarea.addEventListener('keydown',e=>{if(e.key==='Enter'&&e.ctrlKey)runQuery();});

function runQuery(){
  const sit=textarea.value.trim();
  if(!sit)return;
  const result=analyze(sit);
  showResult(result);
}

function cardHTML(a){
  return`<div class="arcana-card"><div class="arcana-svg">${SVGS[a.num]||''}</div><p class="arcana-meta">${a.roman} · ${a.eng}</p><p class="arcana-name">${a.name}</p></div>`;
}

function showResult(result){
  const a1=ARCANA.find(a=>a.num===result.arcana);
  const a2=result.arcana2!==null&&result.arcana2!==undefined?ARCANA.find(a=>a.num===result.arcana2):null;
  const chips=[a1,a2].filter(Boolean).map(cardHTML).join('');
  const aff=getAffirmation(a1.name).map(l=>`<p class="aff-para">${esc(l)}</p>`).join('');
  document.getElementById('inputScreen').style.display='none';
  const rs=document.getElementById('resultScreen');
  rs.style.display='block';
  rs.innerHTML=`<div style="animation:cardIn 0.6s ease both">
    <p class="result-label">Ваш аркан</p>
    <div class="arcana-display">${chips}</div>
    <div class="divider-r"></div>
    <p class="section-lbl">Почему этот аркан</p>
    <p class="reason-text">${esc(a1.reason)}</p>
    <div class="focus-box">
      <p class="focus-lbl">Намерение</p>
      <p class="focus-text">${esc(a1.focus)}</p>
    </div>
    <button class="aff-toggle" id="affBtn" onclick="toggleAff()">
      <span>✦&nbsp; Текст обращения к аркану</span>
      <span class="chevron closed" id="affChev">‹</span>
    </button>
    <div id="affBody" style="display:none" class="aff-body">${aff}</div>
    <div class="action-row">
      <button class="btn-ghost" onclick="editQuery()">Изменить запрос</button>
      <button class="btn-new" onclick="newQuery()">✦ Новый запрос</button>
    </div>
  </div>`;
}

function toggleAff(){
  const b=document.getElementById('affBody'),ch=document.getElementById('affChev'),btn=document.getElementById('affBtn');
  const open=b.style.display==='none';
  b.style.display=open?'block':'none';
  ch.className=open?'chevron open':'chevron closed';
  btn.className=open?'aff-toggle open':'aff-toggle';
}
function editQuery(){
  document.getElementById('resultScreen').style.display='none';
  document.getElementById('inputScreen').style.display='block';
  submitBtn.disabled=false;
  submitBtn.innerHTML='✦&nbsp; Узнать аркан';
}
function newQuery(){
  textarea.value='';submitBtn.disabled=true;
  submitBtn.innerHTML='✦&nbsp; Узнать аркан';
  document.getElementById('resultScreen').style.display='none';
  document.getElementById('inputScreen').style.display='block';
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
